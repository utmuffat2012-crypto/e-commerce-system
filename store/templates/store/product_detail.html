{% extends 'store/base.html' %}

{% block content %}

<div class="row">

<div class="col-md-6">
    <img src="{{ product.image.url }}"
         class="img-fluid">
</div>

<div class="col-md-6">

    <h2>{{ product.name }}</h2>

    <p>{{ product.description }}</p>

    <h4>${{ product.price }}</h4>

    <a href="{% url 'add_to_cart' product.id %}"
       class="btn btn-success">
       Add To Cart
    </a>

</div>

</div>

{% endblock %}
